server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets — return 404 if not found, never fall back to index.html
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
    }

    # Everything else — React router handles it
    location / {
        try_files $uri $uri/ /index.html;
    }
}